<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claveles del Sur - Tercera Terraza</title>
    
    <!-- Firebase SDKs (versión compat para usar firebase.XXX) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
    
    <!-- Font Awesome para íconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Nuestro CSS -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo-titulo">
                <i class="fas fa-building"></i>
                <h1>Claveles del Sur - Tercera Terraza</h1>
            </div>
            <div class="mes-selector">
                <label for="mesSelect">Mes:</label>
                <select id="mesSelect" onchange="cambiarMes()">
                    <option value="2026-03">Marzo 2026</option>
                    <option value="2026-02">Febrero 2026</option>
                    <option value="2026-01">Enero 2026</option>
                </select>
            </div>
        </header>

        <!-- Resumen de colores -->
        <div class="resumen-grid">
            <div class="resumen-card rojo" onclick="filtrarPorColor('rojo')">
                <span class="color-emoji">🔴</span>
                <span class="contador" id="countRojo">0</span>
                <span class="etiqueta">URGENTE</span>
            </div>
            <div class="resumen-card naranja" onclick="filtrarPorColor('naranja')">
                <span class="color-emoji">🟠</span>
                <span class="contador" id="countNaranja">0</span>
                <span class="etiqueta">EN PROCESO</span>
            </div>
            <div class="resumen-card violeta" onclick="filtrarPorColor('violeta')">
                <span class="color-emoji">🟣</span>
                <span class="contador" id="countVioleta">0</span>
                <span class="etiqueta">PONER ATENCIÓN</span>
            </div>
            <div class="resumen-card verde" onclick="filtrarPorColor('verde')">
                <span class="color-emoji">✅</span>
                <span class="contador" id="countVerde">0</span>
                <span class="etiqueta">COMPLETADO</span>
            </div>
        </div>

        <!-- Filtros -->
        <div class="filtros-bar">
            <button class="filtro-btn activo" onclick="mostrarTodos()">Todos</button>
            <button class="filtro-btn" onclick="filtrarPorColor('rojo')">🔴 Urgente</button>
            <button class="filtro-btn" onclick="filtrarPorColor('naranja')">🟠 En Proceso</button>
            <button class="filtro-btn" onclick="filtrarPorColor('violeta')">🟣 Atención</button>
            <button class="filtro-btn" onclick="filtrarPorColor('verde')">✅ Completado</button>
        </div>

        <!-- Título de sección -->
        <div class="seccion-titulo">
            <h2>Trabajos del Mes</h2>
            <span class="badge-mes" id="mesActual">Marzo 2026</span>
        </div>

        <!-- Lista de trabajos -->
        <div id="trabajosList" class="trabajos-list">
            <!-- Aquí se cargarán los trabajos dinámicamente -->
            <div class="loading">Cargando trabajos...</div>
        </div>

        <!-- Botones flotantes -->
        <div class="floating-buttons">
            <button class="btn-flotante" onclick="location.href='nuevo-trabajo.html'">
                <i class="fas fa-plus"></i>
                <span>Nuevo Trabajo</span>
            </button>
            <button class="btn-flotante secundario" onclick="location.href='trabajadores.html'">
                <i class="fas fa-users"></i>
                <span>Trabajadores</span>
            </button>
        </div>
    </div>

    <!-- Nuestros scripts -->
    <script src="js/firebase-config.js"></script>
    <script src="js/trabajos.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
